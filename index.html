<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>StoryTV · Creator CPX Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
/* CSS styles remain consistent with your brand colors */
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #16213e;
  --border: #2a2a4a;
  --accent-org: #00c896;
  --accent-pa: #4f8ef7;
  --accent-blend: #b56cfb;
  --text: #e8eaf6;
  --text-muted: #7b7fa8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }
header { background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
.logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg,#4f8ef7,#b56cfb); border-radius: 8px; display:flex; align-items:center; justify-content:center; }
#app { display:none; padding: 20px; }
.ccard { background: var(--surface); border-radius:12px; border: 1px solid var(--border); padding: 15px; margin-bottom: 20px; }
.compare-3 { display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:15px; }
.chart-panel { background:var(--surface); border-radius:12px; border:1px solid var(--border); padding:16px; min-height: 300px; }
table { width:100%; border-collapse:collapse; margin-top: 20px; }
th { text-align: left; color: var(--text-muted); font-size: 11px; text-transform: uppercase; padding: 10px; border-bottom: 1px solid var(--border); }
td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.roi-badge { padding: 4px 8px; border-radius: 6px; font-weight: bold; background: rgba(79,142,247,0.1); color: var(--accent-pa); }
</style>
</head>
<body>

<header>
  <div style="display:flex; align-items:center; gap:10px;">
    <div class="logo-icon">📺</div>
    <div>
      <h1 style="font-size:16px;">StoryTV · Performance Dashboard</h1>
      <span style="font-size:10px; color:var(--text-muted);">Live Tracker Analytics</span>
    </div>
  </div>
  <span id="sync-status" style="font-size:11px; color:var(--accent-org);">● Ready</span>
</header>

<div id="loading" style="text-align:center; padding: 100px;">
  <p>Fetching data from published tracker...</p>
</div>

<div id="app">
  <div class="compare-3">
    <div class="ccard">
      <h3 style="color:var(--accent-org); margin-bottom:10px;">Organic Trials</h3>
      <h2 id="o-trials-val">0</h2>
    </div>
    <div class="ccard">
      <h3 style="color:var(--accent-pa); margin-bottom:10px;">Meta PA Trials</h3>
      <h2 id="p-trials-val">0</h2>
    </div>
    <div class="ccard">
      <h3 style="color:var(--accent-blend); margin-bottom:10px;">Blended CPT</h3>
      <h2 id="b-cpt-val">₹0</h2>
    </div>
  </div>

  <div class="chart-panel">
    <canvas id="performanceChart"></canvas>
  </div>

  <div class="ccard" style="margin-top:20px;">
    <h3>Top Performing Creators</h3>
    <table>
      <thead>
        <tr>
          <th>Creator</th>
          <th>Type</th>
          <th>Total Trials</th>
          <th>Efficiency</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body"></tbody>
    </table>
  </div>
</div>

<script>
// 1. The Link
const PUBLISHED_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQGQ1U2rmf9M0BODebWeLV-1bxQOETA3i6DE54EqMkr73MyguQaSFO4P1UnIf0-elB6VWwK83fe2c6Q/pub?gid=0&single=true&output=csv';

// 2. Global State
let CREATORS = [];
let TOTALS = {};
let CHARTS = {};
const BENCH_CPT = 500;

// 3. Helper: Clean numbers from strings (handles ₹, %, commas)
const cn = s => {
    if (s === undefined || s === null || s === '') return 0;
    const n = parseFloat(String(s).replace(/[₹,%\s]/g, ''));
    return isNaN(n) ? 0 : n;
};

// 4. The Main Engine
async function init() {
    console.log("🚀 Dashboard initializing...");
    const loadingEl = document.getElementById('loading');
    const appEl = document.getElementById('app');

    try {
        const response = await fetch(`${PUBLISHED_CSV_URL}&t=${Date.now()}`);
        if (!response.ok) throw new Error(`Fetch failed: ${response.status}`);
        
        const csvText = await response.text();
        console.log("📥 CSV Data Received. Length:", csvText.length);

        // Split rows and handle potential empty lines
        const allRows = csvText.split(/\r?\n/).map(line => 
            line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(item => item.trim().replace(/^"|"$/g, ''))
        ).filter(row => row.length > 1);

        // Find the Header Row (Look for 'Influencer' or 'Username')
        const headerRowIdx = allRows.findIndex(row => 
            row.join(' ').toLowerCase().includes('influencer') || 
            row.join(' ').toLowerCase().includes('username')
        );

        if (headerRowIdx === -1) throw new Error("Could not find header row in Google Sheet.");

        const header = allRows[headerRowIdx].map(h => h.toLowerCase().trim());
        const dataRows = allRows.slice(headerRowIdx + 1);

        console.log("📋 Found Headers:", header);

        // Column Mapping Helper
        const getIdx = (keywords) => {
            const index = header.findIndex(h => keywords.some(k => h.includes(k)));
            return index === -1 ? null : index;
        };

        const idx = {
            user: getIdx(['username', 'influencer']),
            type: getIdx(['type', 'category']),
            oTrials: getIdx(['acquisitions', 'registrations', 'trials']),
            paTrials: getIdx(['pa_trials', 'pa_purchases', 'purchases']),
            oCost: getIdx(['content cost', 'fee', 'base cost']),
            paCost: getIdx(['pa_spend', 'ad spend', 'spend'])
        };

        console.log("📍 Column Mapping:", idx);

        // Parse Creator Data
        CREATORS = dataRows.filter(r => r[idx.user]).map((r, i) => {
            const oT = cn(r[idx.oTrials]);
            const pT = cn(r[idx.paTrials]);
            const oC = cn(r[idx.oCost]);
            const pC = cn(r[idx.paCost]);

            return {
                user: r[idx.user].replace(/^@/, ''),
                type: r[idx.type] || 'Nano',
                oTrials: oT,
                paTrials: pT,
                totalTrials: oT + pT,
                oCost: oC,
                paCost: pC,
                totalCost: oC + pC
            };
        });

        if (CREATORS.length === 0) throw new Error("Parsed 0 creators. Check column names.");

        // Calculate Totals
        TOTALS = CREATORS.reduce((acc, c) => ({
            oT: acc.oT + c.oTrials,
            pT: acc.pT + c.paTrials,
            totalCost: acc.totalCost + c.totalCost
        }), { oT: 0, pT: 0, totalCost: 0 });

        console.log("📊 Totals Calculated:", TOTALS);

        // Final Render
        renderDashboard();
        
        loadingEl.style.display = 'none';
        appEl.style.display = 'block';

    } catch (err) {
        console.error("❌ Critical Error:", err);
        loadingEl.innerHTML = `<div style="color:#ff4d4d; background:#2a1a1a; padding:20px; border-radius:8px; border:1px solid #4a2a2a;">
            <h3>Dashboard Error</h3>
            <p>${err.message}</p>
            <button onclick="location.reload()" style="margin-top:10px; cursor:pointer;">Retry</button>
        </div>`;
    }
}

function renderDashboard() {
    // Update UI Cards
    document.getElementById('o-trials-val').textContent = TOTALS.oT.toLocaleString();
    document.getElementById('p-trials-val').textContent = TOTALS.pT.toLocaleString();
    
    const bCpt = (TOTALS.oT + TOTALS.pT) > 0 ? TOTALS.totalCost / (TOTALS.oT + TOTALS.pT) : 0;
    document.getElementById('b-cpt-val').textContent = '₹' + Math.round(bCpt).toLocaleString();

    // Leaderboard
    const lb = document.getElementById('leaderboard-body');
    const sorted = [...CREATORS].sort((a,b) => b.totalTrials - a.totalTrials).slice(0, 10);
    
    lb.innerHTML = sorted.map(c => `
        <tr>
            <td><b style="color:var(--accent-pa)">@${c.user}</b></td>
            <td><span style="font-size:10px; opacity:0.7;">${c.type}</span></td>
            <td style="text-align:right">${c.totalTrials}</td>
            <td style="text-align:right">₹${Math.round(c.totalCost / (c.totalTrials || 1))}</td>
        </tr>
    `).join('');

    // Update Chart
    const ctx = document.getElementById('performanceChart').getContext('2d');
    if (CHARTS.main) CHARTS.main.destroy();
    CHARTS.main = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: sorted.map(c => c.user),
            datasets: [
                { label: 'Organic', data: sorted.map(c => c.oTrials), backgroundColor: '#00c896' },
                { label: 'Meta PA', data: sorted.map(c => c.paTrials), backgroundColor: '#4f8ef7' }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { beginAtZero: true, grid: { color: '#2a2a4a' }, ticks: { color: '#7b7fa8' } },
                x: { grid: { display: false }, ticks: { color: '#7b7fa8' } }
            },
            plugins: { legend: { labels: { color: '#7b7fa8' } } }
        }
    });
}

// Start the app
window.addEventListener('DOMContentLoaded', init);</script>
</body>
</html>
